name: Feature request
description: Propose a new capability or enhancement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and proposed solution. Link to an epic if this is part of a larger initiative.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user or business problem does this solve?
      placeholder: As a user, I want…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work at a high level?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you considered and why they were rejected.
    validations:
      required: false

  - type: dropdown
    id: phase
    attributes:
      label: Target phase
      options:
        - phase-1
        - phase-2
        - Unsure
    validations:
      required: true

  - type: input
    id: epic
    attributes:
      label: Parent epic (if any)
      description: Link to epic issue, e.g. `#12`
      placeholder: "#"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
