name: pr-gate
on:
  pull_request:
  workflow_dispatch:
defaults:
  run:
    working-directory: healthai_app
jobs:
  pr-gate:
    name: pr-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true
      - run: flutter --version
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
