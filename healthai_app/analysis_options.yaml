# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

# Pre-existing diagnostics relaxed for the B1 PR gate. Re-enable and fix in C3
# (issue #38 - stricter lint rules).
analyzer:
  errors:
    dead_code: ignore
    deprecated_member_use: ignore
    duplicate_import: ignore
    invalid_null_aware_operator: ignore
    unnecessary_cast: ignore
    unnecessary_non_null_assertion: ignore
    unnecessary_null_comparison: ignore
    unnecessary_type_check: ignore
    unreachable_switch_case: ignore
    unreachable_switch_default: ignore
    unused_catch_stack: ignore
    unused_element: ignore
    unused_element_parameter: ignore
    unused_field: ignore
    unused_import: ignore
    unused_local_variable: ignore
    unnecessary_import: ignore

linter:
  rules:
    avoid_print: false
    avoid_types_as_parameter_names: false
    curly_braces_in_flow_control_structures: false
    empty_catches: false
    library_private_types_in_public_api: false
    no_leading_underscores_for_local_identifiers: false
    prefer_const_constructors_in_immutables: false
    prefer_final_fields: false
    prefer_interpolation_to_compose_strings: false
    prefer_is_empty: false
    sized_box_for_whitespace: false
    unnecessary_brace_in_string_interps: false
    unnecessary_string_interpolations: false
    unnecessary_to_list_in_spreads: false
    unrelated_type_equality_checks: false
    use_build_context_synchronously: false
    use_key_in_widget_constructors: false
    use_rethrow_when_possible: false
    use_super_parameters: false

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
